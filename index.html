<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SheenAI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #1d1d1f;
    --pink: #E5007D;
    --pink-light: #FF4DA6;
    --pink-glow: rgba(229,0,125,0.15);
    --cream: #F5F0EB;
    --white: #ffffff;
    --grey: #6e6e73;
    --border: rgba(255,255,255,0.1);
    --bubble-ai: #2a2a2d;
    --bubble-user: #E5007D;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, sans-serif;
    background: transparent;
    overflow: hidden;
  }

  /* ── FLOATING BUTTON ── */
  #chat-launcher {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--pink);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(229,0,125,0.45), 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    z-index: 9999;
    overflow: hidden;
  }

  #chat-launcher:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(229,0,125,0.55), 0 3px 12px rgba(0,0,0,0.35);
  }

  #chat-launcher img {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  #chat-launcher .launch-icon {
    width: 28px;
    height: 28px;
    fill: white;
  }

  /* Pulse ring */
  #chat-launcher::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--pink);
    animation: pulse 2.5s ease-out infinite;
    z-index: -1;
  }

  @keyframes pulse {
    0%   { transform: scale(1); opacity: 0.6; }
    70%  { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* Label bubble */
  #chat-label {
    position: fixed;
    bottom: 34px;
    right: 98px;
    background: var(--black);
    color: var(--white);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 20px;
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    z-index: 9998;
    opacity: 1;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  #chat-label::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    border: 6px solid transparent;
    border-left-color: var(--black);
    border-right: none;
  }

  #chat-label.hidden { opacity: 0; }

  /* ── CHAT WINDOW ── */
  #chat-window {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 380px;
    max-width: calc(100vw - 32px);
    height: 540px;
    max-height: calc(100vh - 120px);
    background: var(--black);
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(229,0,125,0.2);
    display: flex;
    flex-direction: column;
    z-index: 9997;
    overflow: hidden;
    transform: scale(0.85) translateY(20px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
    transform-origin: bottom right;
  }

  #chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* ── HEADER ── */
  .chat-header {
    background: var(--black);
    border-bottom: 1px solid var(--border);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--pink);
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid var(--pink-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: white;
  }

  .header-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .header-info { flex: 1; }

  .header-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
  }

  .header-status {
    font-size: 11px;
    color: var(--pink-light);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: #4ade80;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--grey);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: color 0.15s ease, background 0.15s ease;
  }

  .close-btn:hover { color: var(--white); background: rgba(255,255,255,0.08); }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.ai  { justify-content: flex-start; }
  .msg-row.user { justify-content: flex-end; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--pink);
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: white;
  }

  .msg-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    font-weight: 450;
  }

  .msg-row.ai .bubble {
    background: var(--bubble-ai);
    color: rgba(255,255,255,0.9);
    border-radius: 14px 14px 14px 4px;
  }

  .msg-row.user .bubble {
    background: var(--bubble-user);
    color: white;
    border-radius: 14px 14px 4px 14px;
    font-weight: 500;
  }

  /* Typing dots */
  .typing-bubble {
    background: var(--bubble-ai);
    padding: 14px 18px;
    border-radius: 14px 14px 14px 4px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 6px; height: 6px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── QUICK REPLIES ── */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 12px;
    flex-shrink: 0;
  }

  .qr-btn {
    background: transparent;
    border: 1px solid rgba(229,0,125,0.4);
    color: var(--pink-light);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }

  .qr-btn:hover {
    background: var(--pink-glow);
    border-color: var(--pink);
    color: white;
  }

  /* ── LEAD CAPTURE FORM ── */
  .lead-form {
    background: rgba(229,0,125,0.08);
    border: 1px solid rgba(229,0,125,0.2);
    border-radius: 12px;
    padding: 14px;
    margin: 4px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .lead-form-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 2px;
  }

  .lead-input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    color: white;
    font-family: inherit;
    width: 100%;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .lead-input::placeholder { color: rgba(255,255,255,0.35); }
  .lead-input:focus { border-color: var(--pink); }

  .lead-submit {
    background: var(--pink);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .lead-submit:hover { background: var(--pink-light); transform: translateY(-1px); }
  .lead-submit:disabled { background: var(--grey); cursor: not-allowed; transform: none; }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 12px 14px 14px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--black);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 8px 8px 8px 14px;
    transition: border-color 0.15s ease;
  }

  .input-row:focus-within { border-color: rgba(229,0,125,0.5); }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: white;
    font-size: 14px;
    font-family: inherit;
    font-weight: 450;
    resize: none;
    max-height: 80px;
    line-height: 1.45;
    padding: 2px 0;
  }

  #userInput::placeholder { color: rgba(255,255,255,0.3); }

  #sendBtn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: var(--pink);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  #sendBtn:hover { background: var(--pink-light); transform: scale(1.05); }
  #sendBtn:disabled { background: rgba(255,255,255,0.1); cursor: not-allowed; transform: none; }

  #sendBtn svg { width: 16px; height: 16px; fill: white; }

  .powered-by {
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    margin-top: 8px;
    font-weight: 500;
  }

  .powered-by a { color: rgba(255,255,255,0.3); text-decoration: none; }

  .error-msg {
    font-size: 12px;
    color: #ff6b6b;
    padding: 6px 10px;
    background: rgba(255,107,107,0.1);
    border-radius: 8px;
    border: 1px solid rgba(255,107,107,0.2);
  }
</style>
</head>

      '<input class="lead-input" id="lead-time" type="text" placeholder="Best time to call (e.g. Tues morning)">' +
      '<input class="lead-input" id="lead-note" type="text" placeholder="Briefly, what is the project? (optional)">' +
      '<button class="lead-submit" id="lead-submit-btn" onclick="submitLead()">Send to Sheena</button>';

    row.appendChild(form);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function submitLead() {
    var name = document.getElementById('lead-name').value.trim();
    var phone = document.getElementById('lead-phone').value.trim();
    var email = document.getElementById('lead-email').value.trim();
    var time = document.getElementById('lead-time').value.trim();
    var note = document.getElementById('lead-note').value.trim();

    if (!name || (!phone && !email)) {
      alert('Please enter your name and at least a phone number or email.');
      return;
    }

    var btn = document.getElementById('lead-submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_key: 'be788539-42da-45f7-b126-caba4a9abb5f',
        subject: 'New lead from SheenAI chatbot',
        from_name: 'SheenAI Chatbot',
        name: name,
        phone: phone || 'Not provided',
        email: email || 'Not provided',
        best_time: time || 'Not specified',
        project_note: note || 'Not provided'
      })
    }).then(function(res) {
      showLeadSuccess(name);
    }).catch(function(err) {
      console.error('Web3Forms error:', err);
      showLeadSuccess(name);
    });
  }

  function showLeadSuccess(name) {
    var formRow = document.getElementById('lead-form-row');
    if (formRow) formRow.remove();
    // Show success inline in the form row rather than a new bubble
    var successDiv = document.createElement('div');
    successDiv.className = 'msg-row ai';
    var av = document.createElement('div');
    av.className = 'msg-avatar';
    var img = document.createElement('img');
    img.src = avatarSrc;
    img.onerror = function() { this.style.display='none'; av.textContent='S'; };
    av.appendChild(img);
    successDiv.appendChild(av);
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = "Done! Sheena will be in touch shortly.";
    successDiv.appendChild(bubble);
    messagesEl.appendChild(successDiv);
    scrollBottom();
    setTimeout(function() {
      appendMessage('ai', "Is there anything else I can help you with?");
    }, 800);
  }

  function showFollowups(questions) {
    // Remove any existing followup bar
    var existing = document.getElementById('followup-bar');
    if (existing) existing.remove();

    var bar = document.createElement('div');
    bar.id = 'followup-bar';
    bar.className = 'quick-replies';
    bar.style.paddingTop = '0';

    questions.forEach(function(q) {
      var btn = document.createElement('button');
      btn.className = 'qr-btn';
      btn.textContent = q;
      btn.onclick = function() {
        bar.remove();
        if (q.toLowerCase().indexOf('contact you') !== -1 || q.toLowerCase().indexOf('speak to') !== -1) {
          // Trigger lead capture
          appendMessage('user', q);
          appendMessage('ai', "Of course! Just leave your details and Sheena will give you a call.[COLLECT_LEAD]");
        } else {
          handleSend(q);
        }
      };
      bar.appendChild(btn);
    });

    messagesEl.appendChild(bar);
    scrollBottom();
  }

  // ── API CALL ───────────────────────────────────────────────
  function setLoading(val) {
    isLoading = val;
    userInput.disabled = val;
    sendBtn.disabled = val;
  }

  async function callAPI(userMessage) {
    messages.push({ role: 'user', content: userMessage });
    setLoading(true);
    showTyping();

    try {
      var res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: messages,
          system: SYSTEM_PROMPT
        })
      });

      if (!res.ok) throw new Error('API error ' + res.status);

      var data = await res.json();
      var reply = data.response || (data.content && data.content[0] && data.content[0].text) || '';

      if (!reply) throw new Error('Empty response');

      messages.push({ role: 'assistant', content: reply });
      hideTyping();
      appendMessage('ai', reply);

    } catch (err) {
      hideTyping();
      var errRow = document.createElement('div');
      errRow.className = 'msg-row ai';
      var errBubble = document.createElement('div');
      errBubble.className = 'error-msg';
      errBubble.textContent = 'Something went wrong. Please try again or email sheena@changemadesimple.com.au directly.';
      errRow.appendChild(errBubble);
      messagesEl.appendChild(errRow);
      scrollBottom();
    } finally {
      setLoading(false);
    }
  }
</script>
